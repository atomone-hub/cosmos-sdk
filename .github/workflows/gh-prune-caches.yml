name: Prune caches for stale branches (gh CLI)

on:
  schedule:
    - cron: "0 4 * * 0"      # Sundays 04:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only report (true) or actually delete (false)"
        required: false
        default: "true"

permissions:
  contents: read
  actions: write   # required for gh cache delete

jobs:
  prune-stale-branch-caches:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      DRY_RUN: ${{ inputs.dry_run || 'true' }}
    steps:
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq coreutils

      - name: Build set of active branch refs
        run: |
          set -euo pipefail
          OWNER=${REPO%%/*}
          NAME=${REPO#*/}

          # Active branches -> refs/heads/<name>
          gh api "/repos/$OWNER/$NAME/branches?per_page=100" --paginate \
            | jq -r '.[].name' \
            | sed 's/^/refs\/heads\//g' \
            | sort -u > /tmp/active_refs.txt

          echo "Active branch refs:"
          head -n 20 /tmp/active_refs.txt || true
          echo "Total active branch refs: $(wc -l < /tmp/active_refs.txt || echo 0)"

      - name: List all caches and choose stale branch caches
        run: |
          set -euo pipefail

          # All caches (increase --limit if you have many)
          gh cache list --limit 1000 --json id,key,ref,last_accessed_at,size_in_bytes \
            > /tmp/caches.json

          # Report header
          echo -e "ID\tSIZE(MB)\tREF\tKEY\tLAST_ACCESSED\tDECISION" > /tmp/report.tsv

          # Build candidate list = caches under refs/heads/* where that ref no longer exists
          jq -c '.[]' /tmp/caches.json | while read -r row; do
            id=$(echo "$row" | jq -r '.id')
            key=$(echo "$row" | jq -r '.key')
            ref=$(echo "$row" | jq -r '.ref // ""')
            size=$(echo "$row" | jq -r '.size_in_bytes // 0')
            la=$(echo "$row" | jq -r '.last_accessed_at // ""')
            size_mb=$(( (size + 1024*1024 - 1) / (1024*1024) ))

            decision="keep"
            case "$ref" in
              refs/heads/*)
                if ! grep -qxF "$ref" /tmp/active_refs.txt 2>/dev/null; then
                  decision="delete-stale-branch"
                fi
                ;;
              *) decision="ignore-non-branch" ;;
            esac

            printf "%s\t%s\t%s\t%s\t%s\t%s\n" \
              "$id" "$size_mb" "${ref:-<none>}" "$key" "$la" "$decision" \
              >> /tmp/report.tsv
          done

          # Extract IDs to delete
          awk -F '\t' 'NR>1 && $6=="delete-stale-branch" {print $1}' /tmp/report.tsv \
            > /tmp/candidate_ids.txt || true

          echo "Report head:"
          head -n 25 /tmp/report.tsv || true
          echo "Candidates to delete: $(wc -l < /tmp/candidate_ids.txt || echo 0)"

      - name: Delete stale branch caches (skip when dry-run)
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          set -euo pipefail
          COUNT=$(wc -l < /tmp/candidate_ids.txt || echo 0)
          if [ "$COUNT" -eq 0 ]; then
            echo "No stale-branch caches to delete."
            exit 0
          fi

          echo "Deleting $COUNT caches…"
          while read -r ID; do
            [ -n "$ID" ] || continue
            gh cache delete "$ID" || true
            sleep 0.2
          done < /tmp/candidate_ids.txt
          echo "✅ Done."

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: cache-prune-report
          path: /tmp/report.tsv
          if-no-files-found: warn
